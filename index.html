<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Test</title>
	<link rel="stylesheet" href="demo.css">
	<script>
		var tokens = {
			hues: ["yellow", "red", "green", "cyan", "blue", "indigo", "pink", "gray"],
			levels: [95, 90, 85, 80, 70, 60, 50, 40, 30, 20, 10]
		}
	</script>
</head>
<body>
	<label>
		<input type="checkbox">
		Dark mode
	</label>
<table>

<script>
	document.write(`
		<thead>
			<tr>
				<th>Hue</th>
				<th>Key</th>
				${tokens.levels.map(level => `<th>${level}</th>`).join("")}
			</tr>
		</thead>`);
	for (let hue of tokens.hues) {
		document.write(`
			<tr style="--color: var(--color-${hue})">
				<th>${hue}</th>
				<th class=swatch></th>
				${tokens.levels.map(level =>
					`<td class=swatch style="--tint: var(--tint-${level})"></td>`).join("")}
			</tr>`);
	}
</script>
</table>
<div class="callouts">
<script>
for (let hue of tokens.hues) {
	document.write(`
		<article class=callout style="--color: var(--color-${hue})">
			<h3>${hue}</h3>
			<p>Color: <code>var(--color-${hue})</code></p>
			<footer>
				<button>Primary</button>
				<button class="outline">Secondary</button>
			</footer>
		</article>`);
}
</script>
</div>
</body>
</html>
